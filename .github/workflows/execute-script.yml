# Fetches basketball schedules (WP API with HTML fallback) and syncs them to
# Google Calendar, then deploys the public calendar-links page to GitHub Pages.
# Runs daily at 6am AEST (UTC+10), or on manual dispatch.
# Requires repo setting: Settings → Pages → Source: "GitHub Actions".

name: Schedule to Calendar

on:
  workflow_dispatch:
    inputs:
      log-level:
        description: "Log level for action run"
        default: 'INFO'
        type: choice
        options:
          - MAJOR
          - INFO
          - DEBUG

  schedule:
    - cron: '0 6 * * *' # 6am AEST (UTC+10)
      timezone: "Australia/Sydney"
      

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-script:
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    env:
      GCAL_CLIENT_ID: ${{ secrets.GCAL_CLIENT_ID }}
      GCAL_CLIENT_SECRET: ${{ secrets.GCAL_CLIENT_SECRET }}
      GCAL_REFRESH_TOKEN: ${{ secrets.GCAL_REFRESH_TOKEN }}
      LOG_LEVEL: INFO
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Set log level
        run: |
          if [[ "${{ inputs.log-level }}" != "" ]]; then
            echo "LOG_LEVEL=${{ inputs.log-level }}" >> $GITHUB_ENV
          fi
          if [[ "${{ runner.debug }}" == "1" ]]; then
            echo "LOG_LEVEL=DEBUG" >> $GITHUB_ENV
          fi

      - name: Run script
        run: uv run python src/main.py

      - name: Upload calendar links page
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: run-script
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
