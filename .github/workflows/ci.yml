# Run simple IC on pushes and pull request to main

name: Run CI on PRs
run-name: >-
  CI · ${{ github.event_name }} · ${{ github.head_ref || github.ref_name }}${{ github.event.pull_request.number && format(' (PR #{0})', github.event.pull_request.number) || '' }} · @${{ github.actor }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Run script
        run: uv run pytest
